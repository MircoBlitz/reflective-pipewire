<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <rect width="144" height="144" rx="16" fill="#0a0a0a"/>
  <!-- Percentage -->
  <text x="72" y="50" text-anchor="middle" font-family="sans-serif" font-size="48" font-weight="bold" fill="#ffffff" opacity="0.85">75%</text>
  <!-- Mirror line -->
  <line x1="20" y1="90" x2="124" y2="90" stroke="#ffffff" stroke-width="1" opacity="0.40"/>
  <!-- Device name -->
  <text x="72" y="100" text-anchor="middle" font-family="sans-serif" font-size="14" fill="#ffffff" opacity="0.5">Default Sink</text>
  <!-- Bar track -->
  <rect x="12" y="120" width="120" height="12" rx="6" fill="#ffffff" opacity="0.12"/>
  <!-- Bar fill -->
  <rect x="12" y="120" width="90" height="12" rx="6" fill="#22c55e" opacity="1.0"/>
</svg>
