<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <rect width="144" height="144" rx="16" fill="#0a0a0a"/>
  <!-- PipeWire-style nodes with reflection -->
  <defs>
    <linearGradient id="refl" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#3b82f6" stop-opacity="0.15"/>
    </linearGradient>
  </defs>
  <!-- Top node cluster (original) -->
  <circle cx="48" cy="38" r="8" fill="#3b82f6"/>
  <circle cx="96" cy="38" r="8" fill="#22c55e"/>
  <circle cx="72" cy="56" r="8" fill="#8b5cf6"/>
  <!-- Connection lines -->
  <line x1="48" y1="38" x2="72" y2="56" stroke="#3b82f6" stroke-width="2.5" opacity="0.7"/>
  <line x1="96" y1="38" x2="72" y2="56" stroke="#22c55e" stroke-width="2.5" opacity="0.7"/>
  <!-- Mirror line -->
  <line x1="24" y1="72" x2="120" y2="72" stroke="#ffffff" stroke-width="1" opacity="0.15"/>
  <!-- Bottom reflection (mirrored, faded) -->
  <circle cx="48" cy="106" r="8" fill="#3b82f6" opacity="0.25"/>
  <circle cx="96" cy="106" r="8" fill="#22c55e" opacity="0.25"/>
  <circle cx="72" cy="88" r="8" fill="#8b5cf6" opacity="0.25"/>
  <line x1="48" y1="106" x2="72" y2="88" stroke="#3b82f6" stroke-width="2.5" opacity="0.15"/>
  <line x1="96" y1="106" x2="72" y2="88" stroke="#22c55e" stroke-width="2.5" opacity="0.15"/>
</svg>
