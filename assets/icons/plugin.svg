<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 144 144">
  <rect width="144" height="144" rx="16" fill="#0a0a0a"/>
  <!-- Main icon -->
  <g opacity="0.85">
    <!-- Connection lines (behind nodes) -->
    <line x1="38" y1="20" x2="72" y2="68" stroke="#22c55e" stroke-width="3"/>
    <line x1="106" y1="20" x2="72" y2="68" stroke="#d98a3a" stroke-width="3"/>
    <!-- Nodes (on top) -->
    <circle cx="38" cy="20" r="11" fill="#22c55e"/>
    <circle cx="106" cy="20" r="11" fill="#d98a3a"/>
    <circle cx="72" cy="68" r="11" fill="#ef4444"/>
  </g>
  <!-- Mirror line -->
  <line x1="20" y1="90" x2="124" y2="90" stroke="#ffffff" stroke-width="1" opacity="0.40"/>
  <!-- Reflection -->
  <g opacity="0.30">
    <line x1="38" y1="160" x2="72" y2="112" stroke="#22c55e" stroke-width="3"/>
    <line x1="106" y1="160" x2="72" y2="112" stroke="#d98a3a" stroke-width="3"/>
    <circle cx="72" cy="112" r="11" fill="#ef4444"/>
    <circle cx="38" cy="160" r="11" fill="#22c55e"/>
    <circle cx="106" cy="160" r="11" fill="#d98a3a"/>
  </g>
</svg>
