<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Volume Knob Settings</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <label>Device</label>
  <select id="device_id" class="full-width">
    <option value="@DEFAULT_AUDIO_SOURCE@">Default Source (Mic)</option>
    <option value="@DEFAULT_AUDIO_SINK@">Default Sink (Speaker)</option>
  </select>

  <label>Icon</label>
  <select id="icon" class="full-width">
    <option value="mic">Mikrofon</option>
    <option value="headset">Headset</option>
    <option value="headphones">Kopfhörer</option>
    <option value="stereo">Anlage</option>
    <option value="jack">3.5mm Jack</option>
    <option value="dac">Externes DAC</option>
    <option value="apps">Anwendungen</option>
    <option value="discord">Discord</option>
    <option value="obs">OBS</option>
    <option value="twitch">Twitch</option>
    <option value="speaker">Lautsprecher</option>
    <option value="mixer">Mixer</option>
  </select>

  <label>Title</label>
  <input type="text" id="title" value="" class="full-width" placeholder="optional">

  <label>Step pro Tick (%)</label>
  <input type="number" id="step" value="5" min="1" max="50" class="full-width">

  <div class="checkbox-row">
    <input type="checkbox" id="react_to_state" checked>
    <label for="react_to_state">React to volume/state</label>
  </div>

  <div class="section">
    <div class="section-title">Icon-Farben</div>
    <label>Aktiv</label>
    <div class="color-row">
      <input type="color" id="icon_color_picker" value="#22c55e">
      <input type="text" id="icon_color" value="#22c55e" maxlength="7">
    </div>
    <label>Muted</label>
    <div class="color-row">
      <input type="color" id="icon_muted_color_picker" value="#ef4444">
      <input type="text" id="icon_muted_color" value="#ef4444" maxlength="7">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Hintergrund</div>
    <label>Aktiv</label>
    <div class="color-row">
      <input type="color" id="bg_color_picker" value="#000000">
      <input type="text" id="bg_color" value="#000000" maxlength="7">
    </div>
    <label>Muted</label>
    <div class="color-row">
      <input type="color" id="bg_muted_color_picker" value="#000000">
      <input type="text" id="bg_muted_color" value="#000000" maxlength="7">
    </div>
  </div>

  <div class="section">
    <div class="section-title">Volume-Bar</div>
    <label>Bar-Farbe</label>
    <div class="color-row">
      <input type="color" id="bar_color_picker" value="#22c55e">
      <input type="text" id="bar_color" value="#22c55e" maxlength="7">
    </div>
  </div>

  <script>
    window.piFields = {
      device_id:        { type: "select", default: "@DEFAULT_AUDIO_SOURCE@" },
      icon:             { type: "select", default: "mic" },
      title:            { type: "text",   default: "" },
      step:             { type: "number",   default: 5 },
      react_to_state:   { type: "checkbox", default: true },
      icon_color:       { type: "color",  default: "#22c55e" },
      icon_muted_color: { type: "color",  default: "#ef4444" },
      bg_color:         { type: "color",  default: "#000000" },
      bg_muted_color:   { type: "color",  default: "#000000" },
      bar_color:        { type: "color",  default: "#22c55e" },
    };
  </script>
  <script src="shared.js"></script>
</body>
</html>
