<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Volume Knob Settings</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="cols">
    <div>
      <label>Device</label>
      <select id="device_id">
        <option value="@DEFAULT_AUDIO_SOURCE@">Default Source (Mic)</option>
        <option value="@DEFAULT_AUDIO_SINK@">Default Sink (Speaker)</option>
      </select>
    </div>
    <div>
      <label>Icon</label>
      <select id="icon">
        <option value="mic">Microphone</option>
        <option value="headset">Headset</option>
        <option value="headphones">Headphones</option>
        <option value="stereo">Stereo</option>
        <option value="jack">3.5mm Jack</option>
        <option value="dac">External DAC</option>
        <option value="apps">Applications</option>
        <option value="discord">Discord</option>
        <option value="obs">OBS</option>
        <option value="twitch">Twitch</option>
        <option value="speaker">Speaker</option>
        <option value="mixer">Mixer</option>
      </select>
    </div>
  </div>

  <div class="cols">
    <div>
      <label>Step per tick (%)</label>
      <input type="number" id="step" value="5" min="1" max="50">
    </div>
    <div>
      <label>Volume Max (%)</label>
      <input type="number" id="max_volume" value="100" min="100" max="150">
    </div>
    <div>
      <label>Display</label>
      <div class="radio-row">
        <input type="radio" name="display_mode" id="display_mode_percent" value="percent">
        <label for="display_mode_percent">%</label>
        <input type="radio" name="display_mode" id="display_mode_bar" value="bar" checked>
        <label for="display_mode_bar">Bar</label>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Icon colors <input type="checkbox" id="react_to_state" checked style="margin-left:8px"> <label for="react_to_state" style="font-weight:normal">React to volume</label></div>
    <div class="color-pair">
      <div>
        <label>Active</label>
        <div class="color-row">
          <input type="color" id="icon_color_picker" value="#22c55e">
          <input type="text" id="icon_color" value="#22c55e" maxlength="7">
        </div>
      </div>
      <div>
        <label>Muted</label>
        <div class="color-row">
          <input type="color" id="icon_muted_color_picker" value="#ef4444">
          <input type="text" id="icon_muted_color" value="#ef4444" maxlength="7">
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Background</div>
    <div class="color-pair">
      <div>
        <label>Active</label>
        <div class="color-row">
          <input type="color" id="bg_color_picker" value="#000000">
          <input type="text" id="bg_color" value="#000000" maxlength="7">
        </div>
      </div>
      <div>
        <label>Muted</label>
        <div class="color-row">
          <input type="color" id="bg_muted_color_picker" value="#000000">
          <input type="text" id="bg_muted_color" value="#000000" maxlength="7">
        </div>
      </div>
    </div>
  </div>

  <script>
    window.piFields = {
      device_id:        { type: "select",  default: "@DEFAULT_AUDIO_SOURCE@" },
      icon:             { type: "select",  default: "mic" },
      step:             { type: "number",  default: 5 },
      max_volume:       { type: "number",  default: 100 },
      display_mode:     { type: "radio",   default: "bar" },
      react_to_state:   { type: "checkbox",default: true },
      icon_color:       { type: "color",   default: "#22c55e" },
      icon_muted_color: { type: "color",   default: "#ef4444" },
      bg_color:         { type: "color",   default: "#000000" },
      bg_muted_color:   { type: "color",   default: "#000000" },
    };
  </script>
  <script src="shared.js"></script>
</body>
</html>
