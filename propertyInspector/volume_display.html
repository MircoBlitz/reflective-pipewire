<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Volume Display Settings</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="cols">
    <div>
      <label>Device</label>
      <select id="device_id">
        <option value="@DEFAULT_AUDIO_SOURCE@">Default Source (Mic)</option>
        <option value="@DEFAULT_AUDIO_SINK@">Default Sink (Speaker)</option>
      </select>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Colors <input type="checkbox" id="react_to_state" checked style="margin-left:8px"> <label for="react_to_state" style="font-weight:normal">React to volume</label></div>
    <div class="color-pair">
      <div>
        <label>Active</label>
        <div class="color-row">
          <input type="color" id="icon_color_picker" value="#22c55e">
          <input type="text" id="icon_color" value="#22c55e" maxlength="7">
        </div>
      </div>
      <div>
        <label>Muted</label>
        <div class="color-row">
          <input type="color" id="icon_muted_color_picker" value="#ef4444">
          <input type="text" id="icon_muted_color" value="#ef4444" maxlength="7">
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Background</div>
    <div class="color-pair">
      <div>
        <label>Active</label>
        <div class="color-row">
          <input type="color" id="bg_color_picker" value="#000000">
          <input type="text" id="bg_color" value="#000000" maxlength="7">
        </div>
      </div>
      <div>
        <label>Muted</label>
        <div class="color-row">
          <input type="color" id="bg_muted_color_picker" value="#000000">
          <input type="text" id="bg_muted_color" value="#000000" maxlength="7">
        </div>
      </div>
    </div>
  </div>

  <script>
    window.piFields = {
      device_id:        { type: "select",   default: "@DEFAULT_AUDIO_SOURCE@" },
      icon:             { type: "select",   default: "mic" },
      react_to_state:   { type: "checkbox", default: true },
      icon_color:       { type: "color",    default: "#22c55e" },
      icon_muted_color: { type: "color",    default: "#ef4444" },
      bg_color:         { type: "color",    default: "#000000" },
      bg_muted_color:   { type: "color",    default: "#000000" },
    };
  </script>
  <script src="shared.js"></script>
</body>
</html>
