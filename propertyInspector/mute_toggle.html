<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Mute Toggle Settings</title>
  <link rel="stylesheet" href="shared.css">
</head>
<body>
  <div class="device-row">
    <label>Device</label>
    <select id="device_id">
      <option value="@DEFAULT_AUDIO_SOURCE@">Default Source (Mic)</option>
      <option value="@DEFAULT_AUDIO_SINK@">Default Sink (Speaker)</option>
    </select>
  </div>

  <div class="cols">
    <div>
    <div>
      <label>Icon</label>
      <select id="icon">
        <option value="mic">Mikrofon</option>
        <option value="headset">Headset</option>
        <option value="headphones">Kopfhörer</option>
        <option value="stereo">Anlage</option>
        <option value="jack">3.5mm Jack</option>
        <option value="dac">Externes DAC</option>
        <option value="apps">Anwendungen</option>
        <option value="discord">Discord</option>
        <option value="obs">OBS</option>
        <option value="twitch">Twitch</option>
        <option value="speaker">Lautsprecher</option>
        <option value="mixer">Mixer</option>
      </select>
    </div>
  </div>

  <div class="checkbox-row">
    <input type="checkbox" id="react_to_state" checked>
    <label for="react_to_state">React to volume/state</label>
  </div>

  <div class="checkbox-row">
    <input type="checkbox" id="auto_device_title" checked>
    <label for="auto_device_title">Auto device name as title</label>
  </div>

  <div class="section">
    <div class="section-title">Titel</div>
    <input type="text" id="title" value="" class="full-width" placeholder="optional (ignored if auto device name enabled)">
    <div class="inline">
      <div>
        <label>Farbe</label>
        <div class="color-row">
          <input type="color" id="title_color_picker" value="#ffffff">
          <input type="text" id="title_color" value="#ffffff" maxlength="7">
        </div>
      </div>
      <div>
        <label>Größe</label>
        <input type="number" id="title_size" value="14" min="8" max="32">
      </div>
      <div>
        <label>Position</label>
        <select id="title_position">
          <option value="top">Oben</option>
          <option value="middle">Mitte</option>
          <option value="bottom">Unten</option>
        </select>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Icon-Farben</div>
    <div class="color-pair">
      <div>
        <label>Aktiv</label>
        <div class="color-row">
          <input type="color" id="icon_color_picker" value="#22c55e">
          <input type="text" id="icon_color" value="#22c55e" maxlength="7">
        </div>
      </div>
      <div>
        <label>Muted</label>
        <div class="color-row">
          <input type="color" id="icon_muted_color_picker" value="#ef4444">
          <input type="text" id="icon_muted_color" value="#ef4444" maxlength="7">
        </div>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Hintergrund</div>
    <div class="color-pair">
      <div>
        <label>Aktiv</label>
        <div class="color-row">
          <input type="color" id="bg_color_picker" value="#000000">
          <input type="text" id="bg_color" value="#000000" maxlength="7">
        </div>
      </div>
      <div>
        <label>Muted</label>
        <div class="color-row">
          <input type="color" id="bg_muted_color_picker" value="#000000">
          <input type="text" id="bg_muted_color" value="#000000" maxlength="7">
        </div>
      </div>
    </div>
  </div>

  <script>
    window.piFields = {
      device_id:        { type: "select",   default: "@DEFAULT_AUDIO_SOURCE@" },
      icon:             { type: "select",   default: "mic" },
      react_to_state:   { type: "checkbox", default: true },
      auto_device_title:{ type: "checkbox", default: true },
      title:            { type: "text",     default: "" },
      title_color:      { type: "color",    default: "#ffffff" },
      title_size:       { type: "number",   default: 14 },
      title_position:   { type: "select",   default: "top" },
      icon_color:       { type: "color",    default: "#22c55e" },
      icon_muted_color: { type: "color",    default: "#ef4444" },
      bg_color:         { type: "color",    default: "#000000" },
      bg_muted_color:   { type: "color",    default: "#000000" },
    };
  </script>
  <script src="shared.js"></script>
</body>
</html>
